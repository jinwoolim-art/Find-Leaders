<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>시민의 목소리 — 우리 동네 후보자에게 한마디</title>
  <meta name="description" content="가입 없이 한 줄로 끝. 우리 동네 후보자에게 시민의 한마디를 전달합니다.">
  <meta property="og:title" content="시민의 목소리 — 우리 동네 후보자에게 한마디">
  <meta property="og:description" content="23,481명이 참여한 시민의 한마디. 가입 없이 한 줄이면 충분합니다.">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#7C3AED', primaryDark: '#6D28D9' },
          fontFamily: { sans: ['Pretendard', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Pretendard', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
    @keyframes pulseDot { 0%,100% { opacity: 1;} 50% { opacity: 0.35;} }
    .pulse-dot { animation: pulseDot 1.2s infinite; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    .count-pop { animation: countPop 0.5s ease-out; }
    @keyframes countPop {
      0%   { transform: scale(1); text-shadow: none; }
      25%  { transform: scale(1.3); color: #C026D3; text-shadow: 0 0 28px rgba(192,38,211,0.55); }
      60%  { transform: scale(1.1); }
      100% { transform: scale(1); text-shadow: none; color: #7C3AED; }
    }

    /* ============ SPEECH BUBBLE (말풍선) ============ */
    #balloon-stage {
      position: relative;
      width: 100%;
      overflow: hidden;
      pointer-events: none;
    }
    .balloon {
      position: absolute;
      bottom: 0;
      width: 118px;
      padding: 8px 10px 10px;
      border-radius: 16px;
      pointer-events: none; /* 풍선이 tap-hint/input 클릭 가로채지 않게 */
      text-align: center;
      background: var(--bg, #A78BFA);
      color: var(--fg, #fff);
      filter: drop-shadow(0 6px 14px rgba(0,0,0,0.18));
      animation: floatUp var(--dur, 10s) ease-out forwards;
      transform: translateX(-50%);
      will-change: transform, bottom, opacity;
    }
    .balloon.mine {
      width: 142px;       /* 일반 118 → 강조 */
      z-index: 10;        /* 다른 풍선 위로 */
      animation-name: floatUpMine;
      filter: drop-shadow(0 8px 22px rgba(124,58,237,0.4));
    }
    /* 내 풍선 아래 실 + 매달린 하트 (살랑살랑) */
    .balloon-string {
      position: absolute;
      top: 100%;
      left: 50%;
      width: 1.5px;
      height: 36px;
      background: linear-gradient(180deg, rgba(124,58,237,0.7), rgba(168,85,247,0.4));
      transform-origin: top center;
      animation: stringSway 1.8s ease-in-out infinite alternate;
      pointer-events: none;
    }
    .heart-tail {
      position: absolute;
      bottom: -18px;
      left: -9px;
      font-size: 18px;
      filter: drop-shadow(0 0 6px rgba(168,85,247,0.8));
      animation: heartBlink 1.1s ease-in-out infinite;
    }
    @keyframes stringSway {
      from { transform: rotate(-12deg); }
      to   { transform: rotate(12deg); }
    }
    @keyframes heartBlink {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.65; transform: scale(1.2); }
    }
    /* 말풍선 꼬리 — 좌하단 약간 안쪽 */
    .balloon::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 26%;
      width: 14px;
      height: 14px;
      background: inherit;
      border-radius: 0 0 0 4px;
      transform: rotate(45deg);
      filter: none;
    }
    @keyframes floatUp {
      0%   { bottom: 0;   opacity: 0; transform: translateX(-50%) scale(0.86); }
      8%   { opacity: 1;  transform: translateX(-50%) scale(1); }
      25%  { transform: translateX(-50%) translateX(calc(var(--drift) * 0.4)) rotate(2deg); }
      50%  { transform: translateX(-50%) translateX(calc(var(--drift) * -0.3)) rotate(-2deg); }
      75%  { transform: translateX(-50%) translateX(calc(var(--drift) * 0.6)) rotate(1.5deg); }
      90%  { opacity: 1; }
      100% { bottom: 100%; opacity: 0; transform: translateX(-50%) translateX(var(--drift)) rotate(0) scale(0.78); }
    }
    @keyframes floatUpMine {
      0%   { bottom: 0;   opacity: 0; transform: translateX(-50%) scale(0.5); }
      8%   { opacity: 1;  transform: translateX(-50%) scale(1.1); }
      15%  { transform: translateX(-50%) scale(1); }
      30%  { transform: translateX(-50%) translateX(calc(var(--drift) * 0.4)) rotate(2deg); }
      55%  { transform: translateX(-50%) translateX(calc(var(--drift) * -0.3)) rotate(-2deg); }
      80%  { transform: translateX(-50%) translateX(calc(var(--drift) * 0.6)) rotate(1.5deg); }
      90%  { opacity: 1; }
      100% { bottom: 100%; opacity: 0; transform: translateX(-50%) translateX(var(--drift)) rotate(0) scale(0.78); }
    }

    /* ============ CLOUDS (구름) ============ */
    .cloud {
      position: absolute;
      pointer-events: none;
      user-select: none;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.04));
      animation: cloudFloat 5s ease-in-out infinite;
    }
    .cloud.c2 { animation-duration: 7s; animation-delay: -2s; }
    .cloud.c3 { animation-duration: 6s; animation-delay: -3s; }
    .cloud.c4 { animation-duration: 8s; animation-delay: -1s; }
    @keyframes cloudFloat {
      0%,100% { transform: translateY(0); }
      50%     { transform: translateY(-5px); }
    }

    /* Input overlay 토글 — 기본 숨김, .show 시 슬라이드 업 */
    .input-overlay {
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
    }
    .input-overlay.show {
      transform: translateY(0);
      pointer-events: auto;
    }

    /* 탭 힌트 — viewport 기준 fixed (stage 외부, 어떤 element와도 충돌 X) */
    .tap-hint {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      padding: 14px 28px;
      background: #7C3AED;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      color: white;
      box-shadow: 0 8px 24px rgba(124,58,237,0.45);
      border: none;
      cursor: pointer;
      animation: tapHintPulse 2s ease-in-out infinite;
      -webkit-tap-highlight-color: rgba(255,255,255,0.3);
    }
    .tap-hint:active { transform: translateX(-50%) scale(0.95); }
    .tap-hint.hidden {
      opacity: 0;
      pointer-events: none;
    }
    @keyframes tapHintPulse {
      0%,100% { transform: translateX(-50%) translateY(0); }
      50%     { transform: translateX(-50%) translateY(-4px); }
    }

    /* 풍선이 구름에 닿는 순간 — 풍선 burst */
    .balloon.reached {
      animation: balloonBurst 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards !important;
    }
    @keyframes balloonBurst {
      0%   { opacity: 1; transform: translateX(-50%) scale(1); }
      35%  { opacity: 1; transform: translateX(-50%) scale(1.18) rotate(-3deg); filter: drop-shadow(0 0 18px rgba(255,255,255,0.7)) drop-shadow(0 6px 14px rgba(0,0,0,0.18)); }
      100% { opacity: 0; transform: translateX(-50%) scale(0.5) rotate(2deg); }
    }
    /* 카운터 ring 폭발 — 풍선 도달 시 카운터 숫자 주변에 동심원 ring */
    .counter-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 200px;
      height: 200px;
      border: 3px solid;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.4);
      animation: counterRing 1.2s ease-out forwards;
      z-index: 0;
    }
    @keyframes counterRing {
      0%   { opacity: 0.9; transform: translate(-50%, -50%) scale(0.4); }
      40%  { opacity: 0.7; }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(2.6); }
    }
    /* 카운터 펄스 강화 — 풍선 도달 시 빛 효과 */
    .count-pop { animation: countPop 0.7s ease-out !important; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen">
  <div class="max-w-[480px] mx-auto bg-white relative shadow-sm flex flex-col overflow-hidden" style="height: 100vh; height: 100dvh;">

    <!-- ============ HEADER (컴팩트) ============ -->

        <h1 class="text-[18px] font-extrabold text-slate-900 leading-tight tracking-tight">제9회 전국동시지방선거</h1>
        <button onclick="share()" class="p-1 rounded-full hover:bg-slate-100 -mr-1" aria-label="공유">

        </button>
      </div>

    <!-- SVG sprite — cloud shape -->
    <svg width="0" height="0" style="position: absolute;" aria-hidden="true">
      <defs>
        <symbol id="cloud-shape" viewBox="0 0 100 60">
          <ellipse cx="30" cy="40" rx="22" ry="16"/>
          <ellipse cx="58" cy="35" rx="28" ry="22"/>
          <ellipse cx="80" cy="44" rx="18" ry="14"/>

    <!-- ============ BALLOON STAGE (카운터 overlay 포함) ============ -->

      <!-- 상단 구름 경계 -->
      <svg style="position: absolute; top: 0; left: 0; width: 100%; height: 70px; pointer-events: none; z-index: 5;" viewBox="0 0 400 70" preserveAspectRatio="none" aria-hidden="true">
        <path d="M0,0 L400,0
                 L400,18
                 C 388,18  396,38  348,38
                 C 290,38  288,8   210,6
                 C 130,4   140,66   72,64
                 C  32,62   26,28    0,30
                 Z" fill="white"/>
      </svg>
      <!-- 카운터 overlay — stage 안 상단 가운데, 풍선·overlay보다 위 (z-30) -->
      <div class="absolute top-1 left-1/2 -translate-x-1/2 text-center pointer-events-none z-30">
        <p class="leading-none">
          <span id="counter" class="text-[36px] font-black text-primary tracking-tight">0</span><span class="text-[11px] font-extrabold text-primary ml-1 tracking-wider align-baseline">SENT</span>
        </p>
      </div>
      <!-- 풍선이 여기서 떠오름 -->


      <!-- ============ INPUT OVERLAY (탭으로 열고닫음 — 기본 숨김) ============ -->
      <div id="input-overlay" class="input-overlay absolute bottom-0 left-0 right-0 z-20 bg-white/85 backdrop-blur-md border-t border-white/40">
        <!-- Nickname row -->
        <div class="px-4 py-1.5 flex items-center gap-2 border-b border-slate-100/60">
          <span class="material-symbols-outlined text-slate-400 text-base">person</span>
          <input id="main-nickname" type="text" maxlength="2" oninput="onMainNicknameChange()"
            placeholder="시민 이름·닉네임 2자 (선택, 예: 김O)"
            class="flex-1 text-xs bg-transparent focus:outline-none placeholder:text-slate-400">
          <button onclick="showPrivacyInfo()" class="p-0.5 text-slate-300 hover:text-slate-500" aria-label="개인정보 안내">
            <span class="material-symbols-outlined text-[16px]">info</span>
          </button>
        </div>
        <!-- Target chip -->
        <button id="target-chip" onclick="openTargetModal()" class="w-full px-4 py-1.5 flex items-center gap-2 border-b border-slate-100/60 text-left active:bg-slate-50/60">
          <span class="material-symbols-outlined text-primary text-base">location_on</span>
          <span id="target-label" class="flex-1 text-xs text-slate-500 truncate">동네와 후보자를 먼저 선택해주세요</span>
          <span class="material-symbols-outlined text-slate-300 text-base">edit</span>
        </button>
        <!-- KakaoTalk-style input bar -->
        <div class="px-3 py-2 flex items-end gap-2 bg-slate-50/60">
          <button onclick="openIlkkunApp()" aria-label="묻다 앱 다운로드" class="hidden size-9 items-center justify-center text-slate-500 shrink-0 hover:text-primary active:scale-95 transition-all">
            <span class="material-symbols-outlined text-xl">add</span>
          </button>
          <div class="flex-1 bg-white rounded-2xl border border-slate-200 flex items-end">
            <textarea id="message" rows="1" maxlength="200" placeholder="동네와 후보자 선택 후 입력 가능"
              enterkeyhint="send"
              class="flex-1 px-3 py-2.5 text-sm bg-transparent resize-none focus:outline-none disabled:text-slate-400 max-h-[120px]"
              disabled
              oninput="autoResize(this); updateSendBtn();"
              onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault(); submitMessage();}"></textarea>
            <span id="char-count" class="text-[10px] text-slate-300 px-2 pb-2">0/200</span>

          <button id="send-btn" onclick="submitMessage()" disabled
            class="size-10 rounded-full bg-slate-200 text-slate-400 flex items-center justify-center transition-all shrink-0">
            <span class="material-symbols-outlined text-base">send</span>

        </div>

    </div>

    <!-- ============ TAP-HINT (viewport fixed, stage 외부 — 어떤 element에도 영향 안 받음) ============ -->
    <button id="tap-hint" type="button" onclick="openInputOverlay()" class="tap-hint">탭하여 한마디 쓰기 ↑</button>

    <!-- ============ TARGET MODAL ============ -->
    <div id="target-modal" class="fixed inset-0 z-[60] hidden">
      <div class="absolute inset-0 bg-black/50" onclick="closeTargetModal()"></div>
      <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[480px] bg-white rounded-t-3xl max-h-[85vh] overflow-y-auto">
        <div class="sticky top-0 bg-white px-5 pt-4 pb-3 border-b border-slate-100 z-10">

        </div>

                <option value="">시·도 선택</option>
              </select>
              <select id="sel-sigungu" onchange="onSigunguChange()" disabled class="w-full px-3 py-2.5 text-sm rounded-lg border border-slate-200 bg-white disabled:opacity-50 focus:outline-none focus:border-primary">
                <option value="">시·군·구 선택</option>
              </select>
            </div>
            <input id="sel-dong" type="text" maxlength="20" oninput="onDongChange()" disabled placeholder="읍·면·동 직접 입력 (선택, 예: 논현동)"

            <input id="sel-nickname" type="text" maxlength="2" oninput="onNicknameChange()" placeholder="이름·닉네임 2자 (선택, 예: 김O)"

          </div>

<script>
  // ============ DUMMY DATA (실제 운영 시 NEC 데이터로 교체) ============
  // 전국 17개 시·도 + 시·군·구 (행정안전부 2024 기준)
  const REGIONS = {
    '서울특별시': ['종로구','중구','용산구','성동구','광진구','동대문구','중랑구','성북구','강북구','도봉구','노원구','은평구','서대문구','마포구','양천구','강서구','구로구','금천구','영등포구','동작구','관악구','서초구','강남구','송파구','강동구'],
    '부산광역시': ['중구','서구','동구','영도구','부산진구','동래구','남구','북구','해운대구','사하구','금정구','강서구','연제구','수영구','사상구','기장군'],
    '대구광역시': ['중구','동구','서구','남구','북구','수성구','달서구','달성군','군위군'],
    '인천광역시': ['미추홀구','연수구','남동구','부평구','계양구','서구','검단구','영종구','제물포구','강화군','옹진군'],
    '대전광역시': ['동구','중구','서구','유성구','대덕구'],

  // ============ NEC HELPERS ============
  const normSig = s => (s || '').replace(/\s/g, '');
  const isProvincialSgg = sgg => /제\s*\d+선거구/.test(sgg || '');

  function getElectionLabel(c, et) {
    if (c.election) return c.election; // dummy fallback (이미 election 텍스트 있음)
    const sido = c.sido || '';
    if (et === 'governor') {
      if (sido === '세종특별자치시') return '세종특별자치시장';
      if (sido.endsWith('특별자치도')) return sido + '지사';
      if (sido.endsWith('도')) return sido + '지사';
      if (sido.endsWith('특별시')) return sido + '장';
      if (sido.endsWith('광역시')) return sido + '장';
      return sido + '장';
    }
    if (et === 'head') {
      const sgg = c.sggName || c.wiwName || '';
      if (sgg.endsWith('구')) return sgg + '청장';
      if (sgg.endsWith('군')) return sgg + '수';
      if (sgg.endsWith('시')) return sgg + '장';
      return sgg + '장';
    }
    if (et === 'provincial') {
      return sido + '의원 ' + (c.sggName || '');
    }
    if (et === 'local') {
      const wiw = c.wiwName || '';
      const sgg = (c.sggName || '').replace(wiw, '');
      return wiw + '의원 ' + sgg;
    }
    if (et === 'education') return sido + '교육감';
    return '후보자';
  }

  function getCandidatesFor(sido, sigungu, electionType) {
    let pool = [];
    if (NEC.loaded) {
      if (electionType === 'governor')      pool = NEC.governor.filter(c => c.sido === sido);
      else if (electionType === 'education') pool = NEC.superintendent.filter(c => c.sido === sido);
      else if (electionType === 'head') {
        const sn = normSig(sigungu);
        pool = NEC.mayor.filter(c => c.sido === sido && (sn === normSig(c.sggName) || sn.startsWith(normSig(c.sggName))));
      }
      else if (electionType === 'provincial' || electionType === 'local') {
        const sn = normSig(sigungu);
        pool = NEC.council.filter(c => {
          if (c.sido !== sido) return false;
          const prov = isProvincialSgg(c.sggName);
          if (electionType === 'provincial' && !prov) return false;
          if (electionType === 'local' && prov) return false;
          return normSig(c.wiwName) === sn;
        });
      }
    } else {
      // fallback: dummy CANDIDATES_BY_REGION (NEC 로드 안 됐을 때)
      const key = `${sido}|${sigungu}`;
      pool = (CANDIDATES_BY_REGION[key] || []).filter(c => c.electionType === electionType);
    }
    // dedupe by id
    const seen = new Set();
    return pool.filter(c => seen.has(c.id) ? false : (seen.add(c.id), true))
      .sort((a, b) => (a.number || 99) - (b.number || 99));
  }

  function getAvailableElectionTypes(sido, sigungu) {
    const types = new Set();
    ELECTION_TYPES.forEach(t => {
      if (getCandidatesFor(sido, sigungu, t.id).length > 0) types.add(t.id);
    });
    return types;
  }

  async function loadNECCandidates() {
    try {
      const res = await fetch('assets/candidates-real.json');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      NEC.governor = data.governor || [];
      NEC.mayor = data.mayor || [];
      NEC.council = data.council || [];
      NEC.superintendent = data.superintendent || [];
      NEC.loaded = true;
      console.log('NEC 후보자 로드 완료:',
        `governor ${NEC.governor.length}, mayor ${NEC.mayor.length}, council ${NEC.council.length}, superintendent ${NEC.superintendent.length}`);
      // 모달이 열려있고 시·군·구가 선택돼 있으면 재렌더
      if (selected.sido && selected.sigungu) {
        renderElectionTypes();
        renderCandidates();
      }
    } catch (e) {
      console.warn('NEC 후보자 로드 실패 — http 서버로 띄워야 작동합니다 (python3 -m http.server). 더미 데이터로 진행합니다.', e);
    }
  }

  // Input overlay 토글 — stage 터치 시 열고/닫고, 발송 후 유지(키보드 그대로면 계속 발송)
  function openInputOverlay() {
    const overlay = document.getElementById('input-overlay');
    const hint = document.getElementById('tap-hint');
    const msgEl = document.getElementById('message');
    overlay.classList.add('show');
    if (hint) hint.classList.add('hidden');
    if (!selected.candidate) {
      openTargetModal();
    } else {
      setTimeout(() => msgEl.focus(), 100);
    }
  }
  function closeInputOverlay() {
    const overlay = document.getElementById('input-overlay');
    const hint = document.getElementById('tap-hint');
    const msgEl = document.getElementById('message');
    overlay.classList.remove('show');
    if (hint) hint.classList.remove('hidden');
    msgEl.blur();
  }
  function setupInputOverlayToggle() {
    const stage = document.getElementById('balloon-stage');
    const overlay = document.getElementById('input-overlay');
    const hint = document.getElementById('tap-hint');
    const msgEl = document.getElementById('message');
    if (!stage || !overlay) return;

    // tap-hint button — pointerdown(터치+클릭 통합) 즉시 반응
    if (hint) {
      const hintHandler = (e) => {
        e.preventDefault();
        e.stopPropagation();
        openInputOverlay();
      };
      hint.addEventListener('pointerdown', hintHandler);
      hint.addEventListener('click', hintHandler); // fallback
    }

    // stage 영역 어디든 탭 → overlay 토글
    stage.addEventListener('click', (e) => {
      if (e.target.closest('#input-overlay') || e.target.closest('#tap-hint')) return;
      if (overlay.classList.contains('show')) closeInputOverlay();
      else openInputOverlay();
    });

    // 비활성 input 클릭(터치) 시 — 모달 자동 열기
    msgEl.addEventListener('click', (e) => {
      if (msgEl.disabled) {
        e.preventDefault();
        openTargetModal();
      }
    });
  }

  // 정당별 풍선 색상 (NEC 데이터의 실제 정당명에 맞춤)

  function getPartyColor(party) {

  // 약식 sido → 풀네임 (후보자 표기용)
  function fullSidoName(s) {
    const map = {
      '서울':'서울특별시','부산':'부산광역시','대구':'대구광역시','인천':'인천광역시',
      '광주':'광주광역시','대전':'대전광역시','울산':'울산광역시','세종':'세종특별자치시',
      '경기':'경기도','강원':'강원특별자치도','충북':'충청북도','충남':'충청남도',
      '전북':'전북특별자치도','전남':'전라남도','경북':'경상북도','경남':'경상남도','제주':'제주특별자치도'
    };
    return map[s] || s;
  }

  // 선거유형 라벨을 후보자 지역/직책에 맞춰 구체화
  //   광역단체장: sido 끝 글자로 → "도지사" / "시장"
  //   기초단체장: election 텍스트 끝으로 → "구청장" / "군수" / "시장"
  //   시·도의원: sido 끝으로 → "도의원" / "시의원"
  //   시·군·구의원: sigungu 끝 글자로 → "구의원" / "군의원" / "시의원"
  function adaptElectionLabel(sido, etLabel, m) {
    if (etLabel === '시·도지사') {
      const s = fullSidoName(sido) || sido;
      return s.endsWith('도') ? '도지사' : '시장';
    }
    if (etLabel === '시장·군수·구청장') {
      const e = (m && m.election) || '';
      if (e.endsWith('구청장')) return '구청장';
      if (e.endsWith('군수'))   return '군수';
      if (e.endsWith('시장'))   return '시장';
      return etLabel;
    }
    if (etLabel === '시·도의원') {
      const s = fullSidoName(sido) || sido;
      return s.endsWith('도') ? '도의원' : '시의원';
    }
    if (etLabel === '시·군·구의원') {
      const sg = ((m && m.sigungu) || '').replace(/\s/g, '');
      if (sg.endsWith('구')) return '구의원';
      if (sg.endsWith('군')) return '군의원';
      if (sg.endsWith('시')) return '시의원';
      return etLabel;
    }
    return etLabel;
  }

  function balloonInner(m, isMine) {
    const candSido = fullSidoName(m.sido);          // 후보자 출마 지역 — 풀네임
    const citizenLoc = `${m.sido} ${m.sigungu}${m.dong ? ' ' + m.dong : ''}`; // 시민 지역 — 약식
    const citizenName = m.nickname ? escapeHtml(m.nickname) : '';
    const mineBadge = isMine ? ' <span class="text-[9px] font-bold opacity-90">(나)</span>' : '';
    const topic = m.topic || '정책';
    const etLabel = adaptElectionLabel(m.sido, m.electionTypeLabel || '', m);
    const numBadge = m.candidateNumber
      ? `<span class="inline-flex items-center justify-center min-w-[16px] h-[16px] px-1 bg-white/35 text-[10px] font-extrabold rounded-md mx-1 align-middle">${m.candidateNumber}</span>`
      : '';
    const party = m.party || '';
    // 내 풍선만 — 실 + 매달린 하트 (살랑살랑)
    const heartTail = isMine ? '<div class="balloon-string"><div class="heart-tail">💜</div></div>' : '';
    return `
      ${heartTail}
      <p class="text-[9px] opacity-80 truncate leading-tight">${escapeHtml(candSido)}${etLabel ? '  ' + escapeHtml(etLabel) : ''}</p>
      <p class="truncate mt-1 leading-tight">
        ${party ? `<span class="text-[9px] opacity-85 align-middle mr-1">${escapeHtml(party)}</span>` : ''}${numBadge}<span class="text-[14px] font-extrabold align-middle">${escapeHtml(m.candidate)}</span>
      </p>
      <div class="my-1.5 border-t border-white/30"></div>
      <span class="inline-block text-[9px] font-bold px-2 py-0.5 bg-white/30 rounded-full max-w-full truncate">🏷 ${escapeHtml(topic)}</span>
      <p class="text-[9px] opacity-80 truncate leading-tight mt-1.5">${escapeHtml(citizenLoc)}</p>
      <p class="text-[11px] font-bold truncate mt-0.5 leading-tight">${citizenName ? citizenName + ' 시민' : '시민'}${mineBadge}</p>
    `;
  }

  function spawnBalloon(msg, isMine) {
    const stage = document.getElementById('balloon-stage');
    if (!stage) return;
    const balloon = document.createElement('div');
    balloon.className = 'balloon' + (isMine ? ' mine' : '');
    // 후보자 정당 컬러로 풍선 색상 결정 — 본인 풍선도 동일 (정당 컬러로 통일, .mine은 spawn 시 scale-up bounce만 유지)
    const color = getPartyColor(msg.party);
    // 가로 위치: 15~85% 범위 랜덤 (양 끝 여백)
    const startX = 15 + Math.random() * 70;
    const drift  = (Math.random() - 0.5) * 70; // ±35px 좌우 흔들림
    // 시뮬레이션 14~22초 / 내 풍선 30초 (천천히 + 더 오래 보임)
    const dur    = isMine ? 30 : (14 + Math.random() * 8);
    balloon.style.left = `${startX}%`;
    balloon.style.setProperty('--drift', `${drift}px`);
    balloon.style.setProperty('--dur', `${dur}s`);
    balloon.style.setProperty('--bg', color.bg);
    balloon.style.setProperty('--fg', color.fg);
    balloon.innerHTML = balloonInner(msg, !!isMine);
    stage.appendChild(balloon);

    // 구름 도달 시점 정확히 계산 — 풍선이 stage 안에서 구름 SVG 영역(상단 70px)에 닿는 순간
    const CLOUD_AREA = 70;
    const stageH = stage.clientHeight;
    const reachProgress = Math.max(0.5, (stageH - CLOUD_AREA) / stageH); // 안전 하한
    const reachMs = dur * 1000 * reachProgress;
    setTimeout(() => {
      if (!balloon.isConnected) return;
      // 카운터는 실제 시민(isMine=true)이 보낸 풍선만 +1. 시뮬레이션은 비주얼만.
      if (isMine) bumpCounter(1);
    }, reachMs);
    // 풍선이 stage 위로 사라진 뒤 DOM 제거
    setTimeout(() => balloon.remove(), dur * 1000 + 200);
  }

  function renderTicker() {
    // 초기 3개 풍선 spawn (시간차로)
    for (let i = 0; i < 3; i++) {
      const m = { ...TICKER_POOL[i % TICKER_POOL.length] };
      setTimeout(() => spawnBalloon(m, false), i * 1500);
    }
  }

  function startTickerSimulation() {
    // 3초마다 새 풍선 — dur 14~22초와 조합으로 동시 평균 5~7개 (좁은 모바일 stage에 맞춤)
    setInterval(() => {
      tickerIdx = (tickerIdx + 1) % TICKER_POOL.length;
      const m = { ...TICKER_POOL[tickerIdx] };
      spawnBalloon(m, false);
    }, 3000);
  }

  // ============ COUNTER ============
  function bumpCounter(by) {
    counterValue += by;
    const el = document.getElementById('counter');
    el.textContent = counterValue.toLocaleString();
  }

  function startCounterAnimation() {
    setInterval(() => {
      if (Math.random() < 0.4) bumpCounter(Math.floor(Math.random() * 2) + 1);
    }, 3200);
  }

  // ============ MODAL ============
  function openTargetModal() {
    document.getElementById('target-modal').classList.remove('hidden');
  }
  function closeTargetModal() {
    document.getElementById('target-modal').classList.add('hidden');
  }

  function onSidoChange() {
    selected.sido = document.getElementById('sel-sido').value;
    const sigunguSel = document.getElementById('sel-sigungu');
    sigunguSel.innerHTML = '<option value="">시·군·구 선택</option>';
    if (selected.sido) {
      (REGIONS[selected.sido] || []).forEach(s => {
        const opt = document.createElement('option');
        opt.value = s; opt.textContent = s;
        sigunguSel.appendChild(opt);
      });
      sigunguSel.disabled = false;
    } else { sigunguSel.disabled = true; }
    const dongInput = document.getElementById('sel-dong');
    dongInput.value = '';
    dongInput.disabled = true;
    selected.sigungu = ''; selected.dong = ''; selected.electionType = ''; selected.partyFilter = ''; selected.candidate = null;
    renderElectionTypes();
    renderPartyChips();
    renderCandidates();
    refreshConfirmBtn();
  }

  function onSigunguChange() {
    selected.sigungu = document.getElementById('sel-sigungu').value;
    const dongInput = document.getElementById('sel-dong');
    if (selected.sigungu) {
      dongInput.disabled = false;
    } else {
      dongInput.disabled = true;
      dongInput.value = '';
    }
    selected.dong = ''; selected.electionType = ''; selected.partyFilter = ''; selected.candidate = null;
    renderElectionTypes();
    renderPartyChips();
    renderCandidates();
    refreshConfirmBtn();
  }

  function onDongChange() {
    selected.dong = document.getElementById('sel-dong').value.trim();
    refreshConfirmBtn();
  }

  function onNicknameChange() {
    selected.nickname = document.getElementById('sel-nickname').value.trim();
    const main = document.getElementById('main-nickname');
    if (main && main.value !== selected.nickname) main.value = selected.nickname;
    applyNicknameValidationStyle();
  }

  function onMainNicknameChange() {
    selected.nickname = document.getElementById('main-nickname').value.trim();
    const modal = document.getElementById('sel-nickname');
    if (modal && modal.value !== selected.nickname) modal.value = selected.nickname;
    applyNicknameValidationStyle();
  }

  // 닉네임 입력 시 시각 피드백 — 부적절하면 빨강
  function applyNicknameValidationStyle() {
    const invalid = isInvalidNickname(selected.nickname);
    ['main-nickname', 'sel-nickname'].forEach(id => {
      const el = document.getElementById(id);
      if (el) {
        el.classList.toggle('text-red-500', invalid);
        el.classList.toggle('border-red-300', invalid);
      }
    });
  }

  function renderElectionTypes() {
    const wrap = document.getElementById('election-type-list');
    if (!selected.sido || !selected.sigungu) {
      wrap.innerHTML = '<p class="col-span-2 text-xs text-slate-400 text-center py-6 bg-slate-50 rounded-xl">동네를 먼저 선택해주세요</p>';
      return;
    }
    const availableTypes = getAvailableElectionTypes(selected.sido, selected.sigungu);
    wrap.innerHTML = ELECTION_TYPES.map(t => {
      const has = availableTypes.has(t.id);
      const disabledCls = has ? '' : 'opacity-40 pointer-events-none';
      return `
        <button onclick="selectElectionType('${t.id}')" data-tid="${t.id}"
          class="etype-btn ${disabledCls} p-3 border-2 border-slate-200 rounded-xl text-left transition-all active:scale-[0.99]">
          <div class="flex items-center gap-1.5 mb-0.5">
            <span class="material-symbols-outlined text-primary text-[16px]">${t.icon}</span>
            <span class="text-[12px] font-bold text-slate-800">${t.label}</span>
          </div>
          <p class="text-[10px] text-slate-400 ml-[22px]">${t.desc}</p>
        </button>
      `;
    }).join('');
  }

  function selectElectionType(tid) {
    selected.electionType = tid;
    selected.candidate = null;
    selected.partyFilter = ''; // 선거 유형 바뀌면 정당 필터 리셋
    document.querySelectorAll('.etype-btn').forEach(b => {
      const isSel = b.dataset.tid === tid;
      b.classList.toggle('border-primary', isSel);
      b.classList.toggle('bg-violet-50', isSel);
      b.classList.toggle('border-slate-200', !isSel);
    });
    renderPartyChips();
    renderCandidates();
    refreshConfirmBtn();
  }

  function renderPartyChips() {
    const wrap = document.getElementById('party-filter');
    if (!selected.sido || !selected.sigungu || !selected.electionType) {
      wrap.className = 'hidden';
      return;
    }
    const raw = getCandidatesFor(selected.sido, selected.sigungu, selected.electionType);
    // 정당 종류가 2개 이상일 때만 chip 표시 (1개면 필터 의미 없음)
    const parties = Array.from(new Set(raw.map(c => c.party).filter(Boolean)));
    if (parties.length < 2) {
      wrap.className = 'hidden';
      return;
    }
    wrap.className = 'flex gap-1.5 overflow-x-auto scrollbar-hide mb-2 -mx-1 px-1 pb-1';
    const chips = ['', ...parties]; // '' = 전체
    wrap.innerHTML = chips.map(p => {
      const isActive = (selected.partyFilter || '') === p;
      const label = p || '전체';
      const color = p ? getPartyColor(p) : { bg: '#E5E7EB', fg: '#1F2937' };
      const style = isActive
        ? `background:${color.bg};color:${color.fg};border-color:transparent;`
        : `background:#F3F4F6;color:#4B5563;border-color:transparent;`;
      const ringStyle = isActive ? 'box-shadow:0 0 0 2px rgba(124,58,237,0.25);' : '';
      return `<button onclick="setPartyFilter('${p.replace(/'/g, "\\'")}')"
        class="shrink-0 text-[11px] font-bold px-3 py-1.5 rounded-full transition-all border whitespace-nowrap"
        style="${style}${ringStyle}">${escapeHtml(label)}</button>`;
    }).join('');
  }

  function setPartyFilter(p) {
    selected.partyFilter = p || '';
    selected.candidate = null;
    renderPartyChips();
    renderCandidates();
    refreshConfirmBtn();
  }

  function renderCandidates() {
    const wrap = document.getElementById('candidate-list');
    const hint = document.getElementById('cand-hint');
    hint.classList.add('hidden');
    if (!selected.sido || !selected.sigungu) {
      wrap.className = 'block';
      wrap.innerHTML = '<p class="text-xs text-slate-400 text-center py-6 bg-slate-50 rounded-xl">동네를 먼저 선택해주세요</p>';
      return;
    }
    if (!selected.electionType) {
      wrap.className = 'block';
      wrap.innerHTML = '<p class="text-xs text-slate-400 text-center py-6 bg-slate-50 rounded-xl">선거 유형을 먼저 선택해주세요</p>';
      return;
    }
    let cands = getCandidatesFor(selected.sido, selected.sigungu, selected.electionType);
    if (selected.partyFilter) {
      cands = cands.filter(c => c.party === selected.partyFilter);
    }
    if (cands.length === 0) {
      wrap.className = 'block';
      const msg = NEC.loaded
        ? '이 지역·선거 후보자 정보가 곧 공개됩니다'
        : '후보자 데이터 불러오는 중... (http 서버 필요)';
      wrap.innerHTML = `<p class="text-xs text-slate-400 text-center py-6 bg-slate-50 rounded-xl">${msg}</p>`;
      return;
    }
    // 가로 스크롤 carousel
    wrap.className = 'flex gap-2 overflow-x-auto scrollbar-hide pb-1 -mx-5 px-5 snap-x snap-mandatory';
    wrap.innerHTML = cands.map(c => {
      const label = getElectionLabel(c, selected.electionType);
      const num = c.number ? `<span class="absolute top-1 right-1 size-5 bg-primary/10 text-primary text-[10px] font-bold rounded-full flex items-center justify-center">${c.number}</span>` : '';
      return `
        <button onclick="selectCandidate('${String(c.id).replace(/'/g, "\\'")}')" data-cid="${String(c.id)}"
          class="cand-btn relative shrink-0 snap-start w-[140px] p-3 border-2 border-slate-200 rounded-xl text-center transition-all active:scale-[0.99] bg-white">
          ${num}
          <div class="size-14 bg-slate-100 rounded-full flex items-center justify-center text-slate-500 text-lg font-bold mx-auto mb-2">${escapeHtml(c.name[0])}</div>
          <p class="text-sm font-bold text-slate-900 truncate">${escapeHtml(c.name)}</p>
          <p class="text-[10px] text-slate-500 mt-0.5 truncate">${escapeHtml(label)}</p>
          <span class="inline-block mt-1.5 text-[9px] text-slate-500 px-2 py-0.5 bg-slate-100 rounded-full truncate max-w-full">${escapeHtml(c.party || '')}</span>
        </button>
      `;
    }).join('');
    if (cands.length > 2) {
      hint.textContent = `← 좌우로 밀어서 ${cands.length}명 후보자 모두 보기`;
      hint.classList.remove('hidden');
    }
  }

  function selectCandidate(cid) {
    const cands = getCandidatesFor(selected.sido, selected.sigungu, selected.electionType);
    const c = cands.find(x => String(x.id) === String(cid));
    if (!c) return;
    selected.candidate = {
      id: c.id,
      name: c.name,
      party: c.party,
      number: c.number,
      election: getElectionLabel(c, selected.electionType)
    };
    document.querySelectorAll('.cand-btn').forEach(b => {
      const isSelected = b.dataset.cid === String(cid);
      b.classList.toggle('border-primary', isSelected);
      b.classList.toggle('bg-violet-50', isSelected);
      b.classList.toggle('border-slate-200', !isSelected);
    });
    refreshConfirmBtn();
  }

  function refreshConfirmBtn() {
    // 동(dong)은 선택 사항 — 시·도/시·군·구/선거 유형/후보자만 필수
    const ok = selected.sido && selected.sigungu && selected.electionType && selected.candidate;
    document.getElementById('confirm-target').disabled = !ok;
  }

  function confirmTarget() {
    if (!(selected.sido && selected.sigungu && selected.electionType && selected.candidate)) return;
    const locText = selected.dong ? `${selected.sigungu} ${selected.dong}` : selected.sigungu;
    document.getElementById('target-label').innerHTML =
      `<span class="text-slate-700 font-semibold">${locText}</span> · ` +
      `<span class="text-primary font-bold">${selected.candidate.election} ${selected.candidate.name}</span>`;
    const msgEl = document.getElementById('message');
    msgEl.disabled = false;
    msgEl.placeholder = '한마디를 적어주세요...';
    updateSendBtn();
    closeTargetModal();
    // 모달 닫히면 overlay 표시 + input focus (키보드 자동)
    const overlay = document.getElementById('input-overlay');
    overlay?.classList.add('show');
    document.getElementById('tap-hint')?.classList.add('hidden');
    setTimeout(() => msgEl.focus(), 250);
  }

  // ============ INPUT ============
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    document.getElementById('char-count').textContent = `${el.value.length}/200`;
  }

  function updateSendBtn() {
    const msg = document.getElementById('message').value.trim();
    const btn = document.getElementById('send-btn');
    const active = msg.length > 0 && selected.candidate;
    btn.disabled = !active;
    btn.classList.toggle('bg-primary', active);
    btn.classList.toggle('text-white', active);
    btn.classList.toggle('bg-slate-200', !active);
    btn.classList.toggle('text-slate-400', !active);
  }

  function submitMessage() {
    const msgEl = document.getElementById('message');
    const msg = msgEl.value.trim();
    if (!msg || !selected.candidate) return;
    if (containsProfanity(msg)) {
      showToast('부적절한 표현이 포함되어 등록되지 않습니다');
      return;
    }
    if (isInvalidNickname(selected.nickname)) {
      showToast('닉네임에 부적절한 표현이 포함되어 있습니다');
      return;
    }
    const etLabel = (ELECTION_TYPES.find(t => t.id === selected.electionType) || {}).label || '';
    const m = {
      sido: selected.sido.replace('특별시','').replace('광역시','').replace('도','').trim() || selected.sido,
      sigungu: selected.sigungu, dong: selected.dong,
      nickname: selected.nickname,
      electionType: selected.electionType,
      electionTypeLabel: etLabel,
      election: selected.candidate.election, candidate: selected.candidate.name,
      party: selected.candidate.party,  // 풍선 색상에 사용
      candidateNumber: selected.candidate.number,
      topic: '정책 제안', // 실제 운영: 백엔드 LLM 분류 결과 사용
      ago: '방금'
    };
    // 풍선으로 띄움 — 위로 떠오르며 카운터에 도달하면 +1
    spawnBalloon(m, true);
    msgEl.value = '';
    autoResize(msgEl);
    updateSendBtn();
    // 발송 후 input·키보드 유지 — 사용자가 계속 입력하면 연속 발송 가능
    // (사용자가 stage 다른 곳 터치 시 overlay·키보드 자동 닫힘)
    showToast('소망 풍선이 하늘로 올라갑니다 🎈');
  }

  // 시연용 1차 욕설 필터 (운영 시 한국어 사전 + 자모 분리 변형 대응)
  function containsProfanity(text) {
    const list = ['시발','씨발','병신','개새','좆','존나','지랄','꺼져'];
    const stripped = text.replace(/\s/g, '');
    return list.some(w => stripped.includes(w));
  }

  // 2자 닉네임 전용 차단 사전 — 짧고 명확한 욕설만 (false positive 최소화)
  const NICKNAME_BLOCKLIST = [
    // 욕설
    '시발','씨발','씨바','시바','씨방','싯팔',
    '좆까','존나','졸라','좆나','좃까',
    '지랄','지롤',
    '병신','빙신',
    '새끼','색끼','쌔끼','쌔퀴',
    '등신',
    '니미','늬미',
    '꺼져',
    '엿같','엿먹',
    '빡쳐','뒈져','뒤져',
    // 자모 단축 욕설
    'ㅅㅂ','ㅆㅂ','ㅄ','ㅂㅅ','ㅈㄹ','ㄱㅅ','ㅂㅂ',
    // 후보자/정당 약식 (대표 케이스 — 운영 시 NEC 데이터 기반 자동 확장)
    '오훈','재명','석열','민주','국힘','혁신'
  ];

  function isInvalidNickname(text) {
    if (!text) return false;
    const stripped = text.replace(/\s/g, '').toLowerCase();
    if (stripped.length === 0) return false;
    return NICKNAME_BLOCKLIST.some(w => stripped.includes(w));
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function showToast(text) {
    const toast = document.getElementById('toast');
    toast.textContent = text;
    toast.style.opacity = '1';
    setTimeout(() => { toast.style.opacity = '0'; }, 2200);
  }

  // 묻다 앱 다운로드 (Google Play). iOS 추가 시 UA 분기로 App Store 연결.
  function openIlkkunApp() {
    const PLAY_URL = 'https://play.google.com/store/apps/details?id=com.play4.ilkkun&hl=ko';
    window.open(PLAY_URL, '_blank', 'noopener,noreferrer');
  }

  function share() {
    const data = { title: '시민의 목소리', text: '우리 동네 후보자에게 한마디 — 가입 없이 한 줄이면 됩니다.', url: location.href };
    if (navigator.share) navigator.share(data).catch(()=>{});
    else { navigator.clipboard.writeText(location.href); showToast('링크가 복사되었습니다'); }
  }

  function showPrivacyInfo() {
    alert('개인정보 안내\n\n· 개인정보를 수집하지 않습니다.\n· 메시지는 후보자에게만 전달됩니다.\n· 본문은 페이지에 노출되지 않습니다.\n· 닉네임은 최대 2자, 욕설·후보자명은 자동 차단됩니다.');
  }

  init();
</script>
</body>
</html>
